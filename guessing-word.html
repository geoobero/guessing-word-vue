<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Vue Word Guess</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div id="app" class="flex justify-center">
        <div class="mt-40">

            <!-- Word -->
            <h2 class="text-5xl mb-10 text-center">
                {{ display.join(" ") }}
            </h2>

            <!-- Keyboard -->
            <div v-for="(row, i) in keyboard" :key="i" class="flex gap-5 justify-center mb-3">
                <div v-for="letter in row" :key="letter" @click="press(letter)" :class="[
            'text-2xl p-5 border-2 border-gray-600',
            usedLetters.includes(letter)
              ? 'bg-gray-300 cursor-not-allowed opacity-50'
              : 'bg-blue-300 cursor-pointer'
          ]">
                    {{ letter }}
                </div>
            </div>

            <!-- Message -->
            <h1 class="text-5xl text-blue-700 text-center mt-10">
                {{ message }}
            </h1>

        </div>
    </div>

    <script>
        Vue.createApp({
            data() {
                return {
                    words: ["SPEED", "RIGHT", "TABLE", "EAGER", "TRACK"],

                    keyboard: [
                        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
                        ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
                        ["Z", "X", "C", "V", "B", "N", "M"]
                    ],

                    message: "",
                    display: ["_", "_", "_", "_", "_"],
                    usedLetters: [],
                    randomValue: ""
                };
            },

            methods: {
                getRandomWord() {
                    const index = Math.floor(Math.random() * this.words.length);
                    return this.words[index];
                },

                press(letter) {
                    if (this.usedLetters.includes(letter)) return;

                    this.usedLetters.push(letter);

                    for (let i = 0; i < this.randomValue.length; i++) {
                        if (this.randomValue[i] === letter) {
                            this.display[i] = letter;
                        }
                    }

                    this.checkWinner();
                },

                checkWinner() {
                    if (this.display.join("") === this.randomValue) {
                        this.message = "You win!";

                        setTimeout(() => {
                            this.resetGame();
                        }, 2000);
                    }
                },

                resetGame() {
                    this.randomValue = this.getRandomWord();
                    this.display = ["_", "_", "_", "_", "_"];
                    this.usedLetters = [];
                    this.message = "";
                }
            },

            mounted() {
                this.randomValue = this.getRandomWord();
                console.log("Word:", this.randomValue);
            }
        }).mount("#app");
    </script>
</body>

</html>
